<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Robot</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            margin: 0;
        }

        /* Style the 3D viewer container */
        model-viewer {
            width: 500px;
            height: 500px;
            /* Optional: Add a subtle glow or border */
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.2));
        }
    </style>
</head>
<body>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <model-viewer 
        src="path/to/your/animated-robot.glb" 
        camera-controls 
        auto-rotate 
        autoplay 
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
